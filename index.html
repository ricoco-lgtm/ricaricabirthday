<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Ulang Tahun Ericarica!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  *{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
  
  body{
    background:#080812;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    height:100vh;
    width: 100vw;
    font-family:'Press Start 2P',monospace;
    overflow:hidden;
  }

  /* --- LATAR BELAKANG --- */
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
  .star{position:absolute;background:white;width:3px;height:3px;animation:twinkle 2s infinite alternate;}
  @keyframes twinkle{0%{opacity:.1}100%{opacity:1; box-shadow: 0 0 8px #fff;}}

  .scene{
    position:absolute; top:0; left:0; width:100vw; height:100vh;
    background: linear-gradient(to bottom, #0f172a 0%, #1e1b4b 100%);
    overflow:hidden; z-index:1;
  }

  /* JUDUL & PETUNJUK */
  .title-bar{
    position:absolute; top:30px; left:50%; transform:translateX(-50%);
    color:#ffe066; font-size:clamp(10px, 2vw, 16px); letter-spacing:4px;
    text-shadow:0 0 15px #ff6b6b; animation:blink-t 2s infinite; z-index:30;
    text-align: center; width: 100%;
  }
  @keyframes blink-t{0%,100%{opacity:1}50%{opacity:.5}}
  
  #stage-text{
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    color:#94a3b8; font-size:clamp(8px, 1.5vw, 12px); letter-spacing:2px;
    z-index:30; text-align: center; width: 100%;
  }

  /* BULAN & AWAN */
  .moon {
    position: absolute; top: 8vh; right: 8vw; width: 60px; height: 60px;
    background: #ffe066; border-radius: 50%;
    box-shadow: inset -12px -4px 0 #ccaa00, 0 0 40px #ffe066;
  }
  .cloud {
    position: absolute; background: #ffffff44; height: 20px; width: 80px; border-radius: 20px;
    animation: drift linear infinite;
  }
  .cloud::before { content:''; position:absolute; top:-10px; left:20px; width:40px; height:20px; background:#ffffff44; border-radius:20px; }
  .c1 { top: 15vh; left: -100px; animation-duration: 45s; }
  .c2 { top: 25vh; left: -200px; animation-duration: 60s; }
  @keyframes drift { to { transform: translateX(120vw); } }

  /* TANAH */
  .ground{
    position:absolute;bottom:0;left:0;width:100vw;height:22vh; min-height: 130px;
    background:repeating-linear-gradient(90deg,#1e3a10 0,#1e3a10 32px,#295217 32px,#295217 64px);
    border-top:6px solid #4ade80; box-shadow: inset 0 20px 20px rgba(0,0,0,0.4);
  }

  /* BUNGA */
  .flower{position:absolute;bottom:22vh; transform:scale(2); transform-origin:bottom center;}
  .fstem{width:4px;height:22px;background:#4ade80;}
  .fhead{width:14px;height:14px;margin-left:-5px;margin-top:-14px; box-shadow: 0 0 5px rgba(255,255,255,0.5);}

  /* KARAKTER */
  .character{
    position:absolute; bottom:22vh; 
    transition:left 3s cubic-bezier(0.25, 0.8, 0.25, 1);
    filter: drop-shadow(6px 6px 0 rgba(0,0,0,0.5));
    transform: scale(2.5); transform-origin: bottom center;
  }
  #man{left:-20vw;}
  #man.walking{left:35%;}
  #man.arrived{left:38%;}
  #woman{left:55%;}

  .px{display:block;width:6px;height:6px;}
  .spr{display:inline-flex;flex-direction:column;line-height:0;}
  .row{display:flex;}

  /* --- ANIMASI LOMPAT SENANG --- */
  .man-body { position: relative; }
  #man.walking .man-body { 
    animation: happyJump 0.45s ease-in-out infinite; 
  }
  
  @keyframes happyJump {
    0%   { transform: translateY(0) rotate(0deg) scaleY(0.9); } /* Sedikit jongkok sebelum lompat */
    25%  { transform: translateY(-15px) rotate(-5deg) scaleY(1.05); } /* Lompat & goyang kiri */
    50%  { transform: translateY(-25px) rotate(0deg) scaleY(1.1); } /* Puncak lompatan */
    75%  { transform: translateY(-15px) rotate(5deg) scaleY(1.05); } /* Turun & goyang kanan */
    100% { transform: translateY(0) rotate(0deg) scaleY(0.9); } /* Mendarat */
  }

  /* KADO DI ATAS KEPALA RICONA */
  #gift{
    position:absolute; 
    bottom:76px; left:-26px;  
    cursor:pointer;
    filter:drop-shadow(0 0 5px #ff6b6b);
    transition:transform .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform: scale(0.45); transform-origin: bottom center;
    z-index: 10;
  }
  #gift.shake{animation:shake .4s ease 3;}
  @keyframes shake{
    0%,100%{transform:scale(0.45) rotate(0)}
    25%{transform:scale(0.5) rotate(-10deg)}
    75%{transform:scale(0.5) rotate(10deg)}
  }
  #gift:hover{transform:scale(0.55) rotate(-3deg);}
  
  .gpx{display:block;width:10px;height:10px;}
  .grow{display:flex;}

  /* PETUNJUK KLIK */
  #click-hint{
    position:absolute; bottom:140px; left:50%; transform:translateX(-50%);
    color:#fff; font-size:5px; display:none;
    animation:bob .5s infinite alternate; text-shadow:1px 1px 0 #ff6b6b;
    white-space: nowrap; z-index: 10;
  }
  #click-hint.show{display:block;}
  @keyframes bob{
    from{transform:translateX(-50%) translateY(0)}
    to{transform:translateX(-50%) translateY(-3px)}
  }

  /* LOVE MUNCUL */
  .floating-heart {
    position: absolute; bottom: calc(15vh + 200px); left: 41%;
    color: #ff2a2a; font-size: 50px; opacity: 0; pointer-events: none; z-index: 11;
  }
  .floating-heart.fly { animation: flyUp 2s ease-out forwards; }
  @keyframes flyUp {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    50% { transform: translateY(-150px) scale(1.5); opacity: 1; }
    100% { transform: translateY(-250px) scale(1); opacity: 0; }
  }

  /* DIALOG BOX RPG BISA DI-SCROLL */
  #speech{
    position:absolute; top:15vh; left:50%;
    transform:translateX(-50%);
    display:none; flex-direction:column; align-items:center;
    width:80vw; max-width:800px; z-index:20;
  }
  #speech.show{display:flex;}
  
  .sbox{
    background:rgba(10, 15, 30, 0.55); border:6px solid #f8fafc; border-radius: 12px;
    padding:30px; padding-right: 15px;
    color:#e2e8f0; font-size:clamp(10px, 1.5vw, 16px); line-height:2.4;
    text-align:left; box-shadow: inset 0 0 20px #000, 8px 8px 0 rgba(0,0,0,0.5);
    width:100%; 
    height: 45vh; 
    min-height: 250px;
    max-height: 400px;
    display: flex; flex-direction: column;
  }
  
  .sbox-title { 
    color: #facc15; font-size: clamp(14px, 2vw, 22px); text-align: center; 
    margin-bottom: 20px; text-shadow: 2px 2px #000; 
    flex-shrink: 0; 
  }

  /* Area teks yang bisa di-scroll */
  #typed-text {
    flex-grow: 1;
    overflow-y: auto; 
    padding-right: 15px;
  }

  /* Desain Custom Scrollbar Retro Pixel */
  #typed-text::-webkit-scrollbar {
    width: 12px;
  }
  #typed-text::-webkit-scrollbar-track {
    background: #0f172a; 
    border: 2px solid #334155;
    border-radius: 4px;
  }
  #typed-text::-webkit-scrollbar-thumb {
    background: #facc15; 
    border: 2px solid #000;
    border-radius: 4px;
  }
  #typed-text::-webkit-scrollbar-thumb:hover {
    background: #eab308;
  }
  
  /* MUSIC BUTTON */
  #music-btn {
    position: fixed; bottom: 20px; right: 20px;
    background: #1e1b4b; border: 3px solid #facc15;
    color: #facc15; font-family: 'Press Start 2P', monospace;
    font-size: 8px; padding: 10px 12px;
    cursor: pointer; z-index: 50;
    box-shadow: 4px 4px 0 #000;
    transition: transform .1s;
    image-rendering: pixelated;
  }
  #music-btn:hover { transform: scale(1.05); }
  #music-btn:active { transform: scale(0.95); box-shadow: 2px 2px 0 #000; }
  #music-btn.playing { border-color: #4ade80; color: #4ade80; animation: pulse-btn .8s infinite alternate; }
  @keyframes pulse-btn { from { box-shadow: 4px 4px 0 #000; } to { box-shadow: 4px 4px 0 #4ade80, 0 0 12px #4ade8066; } }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 600px) {
    .title-bar {
      font-size: 7px; letter-spacing: 1px; top: 12px; padding: 0 8px;
    }
    #stage-text {
      font-size: 7px; letter-spacing: 0px; bottom: 10px; padding: 0 8px;
    }
    .moon { width: 36px; height: 36px; top: 6vh; right: 4vw; box-shadow: inset -7px -3px 0 #ccaa00, 0 0 20px #ffe066; }
    .cloud { height: 12px; width: 48px; }
    .cloud::before { width: 24px; height: 12px; top: -6px; }
    .ground { height: 18vh; min-height: 80px; border-top: 4px solid #4ade80; }
    .flower { transform: scale(1.2); bottom: 18vh; }
    .character { transform: scale(1.5); bottom: 18vh; }
    #man.walking { left: 28%; }
    #man.arrived { left: 30%; }
    #woman { left: 52%; }
    #gift { bottom: 46px; left: -16px; transform: scale(0.28); }
    #gift.shake {
      animation: shake .4s ease 3;
    }
    @keyframes shake {
      0%,100%{transform:scale(0.28) rotate(0)}
      25%{transform:scale(0.32) rotate(-10deg)}
      75%{transform:scale(0.32) rotate(10deg)}
    }
    #click-hint { font-size: 5px; bottom: 100px; }
    .floating-heart { font-size: 30px; bottom: calc(12vh + 120px); }
    #speech { top: 10vh; width: 92vw; }
    .sbox {
      padding: 14px; padding-right: 8px;
      font-size: 9px; line-height: 2;
      height: 55vh; min-height: 200px; max-height: 340px;
      border-width: 3px; border-radius: 8px;
    }
    .sbox-title { font-size: 11px; margin-bottom: 12px; }
    #typed-text { padding-right: 8px; }
    #music-btn { font-size: 6px; padding: 8px 10px; bottom: 12px; right: 12px; }
  }

  /* LEVEL UP SCREEN */
  #levelup-screen {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #080812; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
  }
  #levelup-screen.fadeout {
    animation: lvl-fadeout 1s ease forwards;
  }
  @keyframes lvl-fadeout { 0%{opacity:1} 100%{opacity:0; pointer-events:none;} }

  .lvl-flash {
    animation: lvl-flash-bg 0.12s steps(1) 6;
  }
  @keyframes lvl-flash-bg {
    0%,100%{background:#080812}
    50%{background:#1e1b4b}
  }

  #lvl-label {
    color: #facc15; font-size: clamp(10px, 3vw, 18px);
    letter-spacing: 4px; margin-bottom: 16px;
    opacity: 0; animation: lvl-pop 0.3s ease 0.3s forwards;
    text-shadow: 0 0 20px #facc15;
  }
  #lvl-title {
    color: #ffffff; font-size: clamp(28px, 10vw, 72px);
    letter-spacing: 6px; line-height: 1.1;
    opacity: 0; text-align: center;
    animation: lvl-pop 0.4s cubic-bezier(0.175,0.885,0.32,1.5) 0.7s forwards;
    text-shadow: 4px 4px 0 #7c3aed, 8px 8px 0 #000;
  }
  #lvl-num {
    font-size: clamp(60px, 22vw, 160px);
    color: #facc15;
    display: block;
    text-shadow: 6px 6px 0 #b45309, 12px 12px 0 #000;
    animation: lvl-pop 0.5s cubic-bezier(0.175,0.885,0.32,1.5) 1.1s forwards, lvl-glow 1s ease-in-out 1.8s infinite alternate;
    opacity: 0;
  }
  @keyframes lvl-pop {
    from { opacity:0; transform: scale(0.4); }
    to   { opacity:1; transform: scale(1); }
  }
  @keyframes lvl-glow {
    from { text-shadow: 6px 6px 0 #b45309, 12px 12px 0 #000; }
    to   { text-shadow: 6px 6px 0 #b45309, 12px 12px 0 #000, 0 0 40px #facc15, 0 0 80px #fbbf24; }
  }
  #lvl-sub {
    color: #94a3b8; font-size: clamp(7px, 2vw, 12px); letter-spacing: 3px;
    margin-top: 20px; opacity: 0;
    animation: lvl-pop 0.3s ease 2s forwards;
  }
  .lvl-stars {
    display: flex; gap: 12px; margin-top: 24px;
    opacity: 0; animation: lvl-pop 0.4s ease 2.2s forwards;
  }
  .lvl-star {
    font-size: clamp(16px, 5vw, 32px);
    animation: star-spin 0.6s ease forwards;
    opacity: 0;
  }
  .lvl-star:nth-child(1){ animation-delay: 2.3s; }
  .lvl-star:nth-child(2){ animation-delay: 2.5s; }
  .lvl-star:nth-child(3){ animation-delay: 2.7s; }
  .lvl-star:nth-child(4){ animation-delay: 2.9s; }
  .lvl-star:nth-child(5){ animation-delay: 3.1s; }
  @keyframes star-spin {
    0%   { opacity:0; transform: rotate(-180deg) scale(0); }
    100% { opacity:1; transform: rotate(0deg) scale(1); }
  }
  #lvl-tap {
    margin-top: 32px; color: #4ade80; font-size: clamp(7px, 2vw, 10px);
    opacity: 0; animation: lvl-blink 0.8s ease 3.4s infinite;
    letter-spacing: 2px;
  }
  @keyframes lvl-blink { 0%,100%{opacity:0} 50%{opacity:1} }

  /* UFO */
  .ufo {
    position: absolute; top: 12vh; left: -120px;
    z-index: 6; animation: ufo-fly 18s linear infinite;
    filter: drop-shadow(0 0 10px #7c3aed);
  }
  .ufo:nth-child(2) { top: 22vh; animation-duration: 25s; animation-delay: -10s; }
  @keyframes ufo-fly {
    0%   { left: -120px; transform: translateY(0px); }
    25%  { transform: translateY(-18px); }
    50%  { transform: translateY(6px); }
    75%  { transform: translateY(-12px); }
    100% { left: calc(100vw + 120px); transform: translateY(0px); }
  }
  .ufo-body {
    width: 56px; height: 20px; background: #7c3aed;
    border-radius: 50%; position: relative; margin: 0 auto;
    box-shadow: 0 0 12px #a78bfa, inset 0 -4px 8px rgba(0,0,0,0.4);
  }
  .ufo-dome {
    width: 28px; height: 16px; background: #c4b5fd;
    border-radius: 50% 50% 0 0; position: absolute;
    top: -14px; left: 50%; transform: translateX(-50%);
    border: 2px solid #7c3aed;
    box-shadow: 0 0 8px #a78bfa;
  }
  .ufo-beam {
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 28px solid rgba(196,181,253,0.22);
    margin: 0 auto; position: relative;
    top: 0; left: 50%; transform: translateX(-50%);
    filter: blur(2px);
  }
  .ufo-lights {
    display: flex; justify-content: space-around;
    position: absolute; bottom: 4px; width: 100%;
  }
  .ufo-light {
    width: 6px; height: 6px; border-radius: 50%;
    animation: ufo-blink .5s steps(1) infinite;
  }
  .ufo-light:nth-child(1){ background:#facc15; animation-delay:0s; }
  .ufo-light:nth-child(2){ background:#4ade80; animation-delay:.16s; }
  .ufo-light:nth-child(3){ background:#f87171; animation-delay:.32s; }
  @keyframes ufo-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* FLASH & FIREWORKS */
  #flash{position:absolute;top:0;left:0;width:100vw;height:100vh;background:white;opacity:0;pointer-events:none;z-index:15;}
  #flash.go{animation:fl .6s ease forwards;}
  @keyframes fl{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
  #fw-canvas{position:absolute;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:12; mix-blend-mode: screen;}
  .conf{position:absolute;pointer-events:none;animation:cf linear forwards;z-index:13;}
  @keyframes cf{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>

const particles = [];
const FW_COLORS = [
  ['#facc15','#fef08a'], ['#f87171','#fecaca'], ['#38bdf8','#bae6fd'], ['#c084fc','#e9d5ff'], ['#4ade80','#bbf7d0']
];

class Particle{
  constructor(x,y,color,angle,speed,type){
    this.x=x;this.y=y;this.color=color;
    this.vx=Math.cos(angle)*speed; this.vy=Math.sin(angle)*speed;
    this.life=1; this.decay=.01+Math.random()*.015;
    this.size=type==='trail'?2:4; this.type=type;
    this.gravity=type==='trail'?.02:.05;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=this.gravity; this.vx*=.96; this.life-=this.decay;
  }
  draw(){
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.color;
    const s=Math.ceil(this.size);
    ctx.shadowBlur = 8; ctx.shadowColor = this.color; 
    ctx.fillRect(Math.round(this.x),Math.round(this.y),s,s);
    ctx.restore();
  }
}

class Rocket{
  constructor(){
    this.x= 50 + Math.random()*(canvas.width - 100);
    this.y=canvas.height;
    this.targetY= canvas.height * 0.1 + Math.random()*(canvas.height * 0.4);
    this.speed=7+Math.random()*4;
    this.colorSet=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
    this.trail=[]; this.done=false;
  }
  update(){
    this.y-=this.speed;
    this.trail.push({x:this.x,y:this.y,life:1});
    this.trail=this.trail.filter(t=>(t.life-=.1)>0);
    if(this.y<=this.targetY){this.explode();this.done=true;}
  }
  explode(){
    for(let i=0;i<80;i++){
      let angle = (i/80)*Math.PI*2;
      let speed = 2+Math.random()*4;
      const c = this.colorSet[Math.floor(Math.random()*this.colorSet.length)];
      particles.push(new Particle(this.x,this.y,c,angle,speed,'burst'));
    }
  }
  draw(){
    ctx.save();
    ctx.fillStyle=this.colorSet[0]; ctx.globalAlpha=1;
    ctx.fillRect(Math.round(this.x),Math.round(this.y),5,5);
    this.trail.forEach(t=>{
      ctx.globalAlpha=t.life*.5; ctx.fillStyle='#ffffff';
      ctx.fillRect(Math.round(t.x),Math.round(t.y),3,3);
    });
    ctx.restore();
  }
}

const rockets=[];
let fwRunning=false;

function launchFireworks(){
  fwRunning=true;
  const schedule=[0,800,1600,2400,3000,4000,5000,6000,7500];
  schedule.forEach((t,i)=>{
    setTimeout(()=>{
      for(let b=0;b<(1+(i%3));b++) setTimeout(()=>rockets.push(new Rocket()),b*200);
    }, t);
  });
  setTimeout(()=>fwRunning=false, 10000);
  requestAnimationFrame(fwLoop);
}

function fwLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  rockets.forEach(r=>{if(!r.done)r.update();r.draw();});
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update();particles[i].draw();
    if(particles[i].life<=0)particles.splice(i,1);
  }
  if(fwRunning||rockets.some(r=>!r.done)||particles.length>0) requestAnimationFrame(fwLoop);
}

  [261.63,0.75],[261.63,0.25],[523.25,1],[440.00,1],[349.23,1],[329.63,1],[293.66,2],
  // "Hap-py Birth-day to you"
  [466.16,0.75],[466.16,0.25],[440.00,1],[349.23,1],[392.00,1],[349.23,2]
];

// Simple bass line (lower octave, 1 beat per note as rhythm)
const HB_BASS = [
  [130.81,1],[130.81,1],[174.61,1],[164.81,1],
  [130.81,1],[130.81,1],[196.00,1],[174.61,1],
  [130.81,1],[130.81,1],[261.63,1],[220.00,1],[174.61,1],[164.81,1],[146.83,1],[0,1],
  [233.08,1],[233.08,1],[220.00,1],[174.61,1],[196.00,1],[174.61,1],[0,1],[0,1]
];

function createOscillator(freq, type, gainVal, startTime, endTime) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.01);
  gain.gain.setValueAtTime(gainVal, endTime - 0.03);
  gain.gain.linearRampToValueAtTime(0, endTime);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startTime);
  osc.stop(endTime);
  musicNodes.push(osc);
  musicNodes.push(gain);
}

function scheduleMusic(startOffset) {
  if (!audioCtx) return;
  let t = audioCtx.currentTime + startOffset;

  // Melody (square wave)
  for (const [freq, dur] of HB_MELODY) {
    const end = t + dur * BEAT * 0.88;
    createOscillator(freq, 'square', 0.18, t, end);
    t += dur * BEAT;
  }
  const totalDuration = t - audioCtx.currentTime - startOffset;

  // Bass (triangle wave, quieter)
  let tb = audioCtx.currentTime + startOffset;
  for (const [freq, dur] of HB_BASS) {
    if (freq > 0) {
      const end = tb + dur * BEAT * 0.8;
      createOscillator(freq, 'triangle', 0.09, tb, end);
    }
    tb += dur * BEAT;
  }

  // Schedule loop
  musicTimeout = setTimeout(() => {
    if (loopActive) scheduleMusic(0.05);
  }, (totalDuration - 0.2) * 1000);
}

function stopMusic() {
  loopActive = false;
  clearTimeout(musicTimeout);
  musicNodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
  musicNodes = [];
}

function startMusic() {
  if (musicPlaying) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicPlaying = true;
  loopActive = true;
  const btn = document.getElementById('music-btn');
  btn.textContent = '■ STOP MUSIK';
  btn.classList.add('playing');
  scheduleMusic(0.1);
}

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (musicPlaying) {
    stopMusic();
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    musicPlaying = false;
    btn.textContent = '♪ MUSIK 8BIT';
    btn.classList.remove('playing');
  } else {
    startMusic();
  }
}

// Autoplay on first interaction (browser requires user gesture)
function handleFirstInteraction() {
  startMusic();
  document.removeEventListener('click', handleFirstInteraction);
  document.removeEventListener('keydown', handleFirstInteraction);
  document.removeEventListener('touchstart', handleFirstInteraction);
}
document.addEventListener('click', handleFirstInteraction);
document.addEventListener('keydown', handleFirstInteraction);
document.addEventListener('touchstart', handleFirstInteraction);
</script>
